<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C3FF5"/>
      <stop offset="100%" stop-color="#4B25D9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative shapes -->
  <rect x="60" y="60" width="80" height="80" rx="12" fill="#E8D754" opacity="0.9"/>
  <rect x="1060" y="60" width="60" height="60" rx="30" fill="#FF9B6B" opacity="0.9"/>
  <rect x="80" y="520" width="50" height="50" rx="8" fill="#2D2D2D" opacity="0.7"/>
  <rect x="1070" y="510" width="70" height="70" rx="10" fill="#E8D754" opacity="0.7"/>
  <circle cx="1100" cy="560" r="30" fill="#FF9B6B" opacity="0.6"/>
  <circle cx="100" cy="300" r="20" fill="#E8D754" opacity="0.4"/>

  <!-- C logo mark -->
  <circle cx="600" cy="220" r="50" fill="white" opacity="0.15"/>
  <text x="600" y="238" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">C</text>

  <!-- Main title -->
  <text x="600" y="340" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle">Champion's Blog</text>

  <!-- Subtitle -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="28" fill="white" opacity="0.85" text-anchor="middle">记录生活，分享想法</text>

  <!-- Divider line -->
  <rect x="520" y="430" width="160" height="4" rx="2" fill="white" opacity="0.4"/>
</svg>
